<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login - ProjetoGames</title>
    <h:outputStylesheet library="manhattan-layout" name="css/layout-blue-orange.css" />
    <h:outputStylesheet library="manhattan-layout" name="css/primeicons.css" />
</h:head>
<h:body style="margin:0;background:#f4f6f9;">
    <div style="max-width:420px;margin:90px auto;padding:30px;background:white;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.15);">
        <h:form>
            <p:growl id="msg" showDetail="true" />
            <h2 style="margin-top:0;text-align:center;">ProjetoGames</h2>
            <p style="text-align:center;">Login do sistema</p>
            <p:panelGrid columns="1" layout="grid" styleClass="ui-fluid">
                <p:outputLabel value="Usuário" />
                <p:inputText value="#{loginController.usuario}" required="true" requiredMessage="Informe o usuário" />
                <p:outputLabel value="Senha" />
                <p:password value="#{loginController.senha}" required="true" requiredMessage="Informe a senha" feedback="false" />
                <p:commandButton value="Entrar" icon="pi pi-sign-in" action="#{loginController.entrar()}" update="msg" />
            </p:panelGrid>
            <p style="font-size:13px;text-align:center;margin-top:20px;">Usuário: <b>admin</b> | Senha: <b>123</b></p>
        </h:form>
    </div>
</h:body>
</html>
